<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湖南省政府领导信息库</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>湖南省政府领导信息库</h1>
        <p>湖南省政府领导过往工作经历与任免信息查询系统</p>
        <div class="notice">
            数据范围：省政府领导及重点部门负责人｜信息来源：政府官网、人大任免公告等官方渠道｜状态：持续核验更新
          </div>
    </header>

    <main>
        <aside class="sidebar">
          <div class="top-bar">
            <input type="text" id="searchInput" placeholder="搜索姓名或职务，例如：毛伟明、省长">
          </div>
      
          <div id="leader-list"></div>
        </aside>
        </div>
        <div id="leader-detail">

            <h2>请选择一位领导</h2>

            <p>点击左侧领导即可查看详细信息。</p>

        </div>

    </main>

    <script src="script.js"></script>

</body>

</html>

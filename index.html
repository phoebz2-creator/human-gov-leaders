<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中国政治研究</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <h1>中国政治研究</h1>
      <p>中国各级领导信息与政治数据库</p>
      <div class="top-nav">
        <button class="top-tab active" data-section="leaders">领导</button>
        <button class="top-tab" data-section="database">数据库</button>
        <button class="top-tab" data-section="others">其他</button>
      </div>
    </div>
  </header>

  <main>
    <section id="leaders-section" class="main-section active">
      <aside class="sidebar">
        <div class="module-title">领导</div>

        <div class="nav-block">
          <div class="nav-heading">中央领导</div>
          <button class="province-btn disabled">建设中</button>
        </div>

        <div class="nav-block">
            <div class="group-title">地方领导</div>

            <div class="region-group">
              <div class="region-title" onclick="toggleRegion()">
                地方省份 ▼
              </div>
            
              <div id="provinceList" class="province-list">
                <div class="province-btn active" data-province="hunan">湖南</div>
                <div class="province-btn" data-province="hubei">湖北</div>
                <div class="province-btn" data-province="guangdong">广东</div>
                <div class="province-btn" data-province="jiangsu">江苏</div>
                <div class="province-btn" data-province="zhejiang">浙江</div>
                <div class="province-btn" data-province="shandong">山东</div>
                <div class="province-btn" data-province="henan">河南</div>
                <div class="province-btn" data-province="sichuan">四川</div>
                <div class="province-btn" data-province="hebei">河北</div>
                <div class="province-btn" data-province="anhui">安徽</div>
                <div class="province-btn" data-province="fujian">福建</div>
                <div class="province-btn" data-province="jiangxi">江西</div>
                <div class="province-btn" data-province="shanxi">山西</div>
                <div class="province-btn" data-province="liaoning">辽宁</div>
                <div class="province-btn" data-province="jilin">吉林</div>
                <div class="province-btn" data-province="heilongjiang">黑龙江</div>
                <div class="province-btn" data-province="hainan">海南</div>
                <div class="province-btn" data-province="guizhou">贵州</div>
                <div class="province-btn" data-province="yunnan">云南</div>
                <div class="province-btn" data-province="shaanxi">陕西</div>
                <div class="province-btn" data-province="gansu">甘肃</div>
                <div class="province-btn" data-province="qinghai">青海</div>
                <div class="province-btn" data-province="taiwan">台湾</div>
                <div class="province-btn" data-province="inner_mongolia">内蒙古</div>
                <div class="province-btn" data-province="guangxi">广西</div>
                <div class="province-btn" data-province="xizang">西藏</div>
                <div class="province-btn" data-province="ningxia">宁夏</div>
                <div class="province-btn" data-province="xinjiang">新疆</div>
                <div class="province-btn" data-province="hongkong">香港</div>
                <div class="province-btn" data-province="macau">澳门</div>
                <div class="province-btn" data-province="beijing">北京</div>
                <div class="province-btn" data-province="tianjin">天津</div>
                <div class="province-btn" data-province="shanghai">上海</div>
                <div class="province-btn" data-province="chongqing">重庆</div>
              </div>
            </div>

        <input
          type="text"
          id="searchInput"
          placeholder="搜索姓名或职务，例如：省长、财政厅"
        />

        <div id="leaderList"></div>
      </aside>

      <section class="content">
        <div id="leaderDetail">
          <h2>请选择一位领导</h2>
          <p>点击左侧领导卡片查看详细信息。</p>
        </div>
      </section>
    </section>

    <section id="database-section" class="main-section placeholder-section">
      <h2>数据库</h2>
      <p>该模块暂时预留，后续可接入政策、机构、任免公告、地方数据等内容。</p>
    </section>

    <section id="others-section" class="main-section placeholder-section">
      <h2>其他</h2>
      <p>该模块暂时预留，后续可根据研究需要扩展。</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
